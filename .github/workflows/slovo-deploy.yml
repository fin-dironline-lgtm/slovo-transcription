name: Deploy Slovo

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t slovo-transcription:latest .

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.SLOVO_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 72.56.248.106 >> ~/.ssh/known_hosts

      - name: Transfer image
        run: docker save slovo-transcription:latest | gzip | ssh root@72.56.248.106 'gunzip | docker load'

      - name: Replace only Slovo container
        run: |
          ssh root@72.56.248.106 '
            set -eu
            docker rm -f slovo-transcription 2>/dev/null || true
            docker run -d --name slovo-transcription --restart unless-stopped --network vector_vector_net slovo-transcription:latest
            docker network connect vector_default slovo-transcription 2>/dev/null || true
            docker exec vector-nginx nginx -t
            docker exec vector-nginx nginx -s reload
            for attempt in $(seq 1 30); do
              if docker exec vector-nginx wget -T 5 -S -O /dev/null http://slovo-transcription:3000/ 2>&1; then
                exit 0
              fi
              sleep 2
            done
            docker logs --tail 100 slovo-transcription
            exit 1
          '

      - name: Verify public site
        run: |
          curl --fail --show-error --silent --max-time 30 https://slovo.vector-mp.ru/ -o /dev/null
          asset=$(curl --fail --show-error --silent --max-time 30 https://slovo.vector-mp.ru/ | grep -o '/assets/[^" ]*\.js' | head -1)
          test -n "$asset"
          curl --fail --show-error --silent --max-time 30 "https://slovo.vector-mp.ru${asset}" -o /dev/null
